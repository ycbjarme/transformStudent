<!DOCTYPE html>
<html>
<head>
    <title>Transition and Animation Exercises</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        #roll {
            width: 400px;
            height: 400px;
            margin: 50px auto;
            position: relative;
            display: flex;
            flex-wrap: wrap; /* Arranges the 4 divs in a 2x2 grid */
            overflow: visible; /* Allows the shapes to slide out slightly if needed */
        }

        /* The Kitten Image - Sits behind everything */
        #roll img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }

        /* Common style for the 4 colored squares */
        #roll div {
            width: 200px;
            height: 200px;
            z-index: 2;
            transition: all 0.6s ease-in-out;
        }

        /* Assigning colors */
        #roll div:nth-of-type(1) { background-color: red; }
        #roll div:nth-of-type(2) { background-color: yellow; }
        #roll div:nth-of-type(3) { background-color: blue; }
        #roll div:nth-of-type(4) { background-color: green; }

        /* THE HOVER EFFECT: Creating the arrow/hexagon shapes */
        
        /* Red Square (Top Left) -> Moves Left and shears */
        #roll:hover div:nth-of-type(1) {
            transform: translateX(-100px);
            clip-path: polygon(100% 0, 100% 100%, 50% 50%);
        }

        /* Yellow Square (Top Right) -> Moves Right and shears */
        #roll:hover div:nth-of-type(2) {
            transform: translateX(100px);
            clip-path: polygon(0 0, 50% 50%, 0 100%);
        }

        /* Blue Square (Bottom Left) -> Moves Left and shears */
        #roll:hover div:nth-of-type(3) {
            transform: translateX(-100px);
            clip-path: polygon(100% 0, 100% 100%, 50% 50%);
        }

        /* Green Square (Bottom Right) -> Moves Right and shears */
        #roll:hover div:nth-of-type(4) {
            transform: translateX(100px);
            clip-path: polygon(0 0, 50% 50%, 0 100%);
        }

        p { text-align: center; font-family: Arial, sans-serif; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="roll">
        <a href="../index.html">
            <img src="images/funny.jpg" alt="funny kitten">
        </a>
        
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <p>
        Click on the Image for Home<br/>
        Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>

</body>
</html>
