<!DOCTYPE html>
<html>
<head>
    <title>Transition and Animation Exercises</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }

        #roll {
            width: 400px;
            height: 400px;
            margin: 30px auto;
            position: relative;
            display: flex;
            flex-wrap: wrap; 
            overflow: hidden;
            background-color: #eee;
        }

        #roll img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; 
        }

        #roll div {
            width: 200px;
            height: 200px;
            transition: all 0.5s ease-in-out;
            z-index: 2; 
        }

        #roll:hover div:nth-of-type(1) { 
            transform: translate(-50px, -50px); 
            clip-path: polygon(100% 0, 100% 100%, 25% 100%);
        }
        #roll:hover div:nth-of-type(2) { 
            transform: translate(50px, -50px); 
            clip-path: polygon(0 0, 0 100%, 75% 100%);
        }
        #roll:hover div:nth-of-type(3) { 
            transform: translate(-50px, 50px); 
            clip-path: polygon(100% 0, 25% 0, 100% 100%);
        }
        #roll:hover div:nth-of-type(4) { 
            transform: translate(50px, 50px); 
            clip-path: polygon(0 0, 75% 0, 0 100%);
        }

        #roll div:nth-of-type(1) { background-color: red; }
        #roll div:nth-of-type(2) { background-color: yellow; }
        #roll div:nth-of-type(3) { background-color: blue; }
        #roll div:nth-of-type(4) { background-color: green; }

        p { text-align: center; font-family: sans-serif; font-size: 12px; }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div id="roll">
        <a href="../index.html">
            <img src="images/funny.jpg" alt="Kitten">
        </a>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <p>
        Click on the Image for Home<br/>
        Source: <a href="images/funny.jpg</a>
    </p>
    
</body>
</html>
