<!DOCTYPE html>
<html>
<head>
    <title>Transition and Animation Exercises</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* The container needs to be relative so the image can sit behind the divs */
        #roll {
            width: 400px;
            height: 400px;
            margin: 30px auto;
            position: relative;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            cursor: pointer;
        }

        /* This places the kitten image underneath the colored blocks */
        #roll img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }

        /* The colored squares */
        #roll div {
            width: 200px;
            height: 200px;
            position: relative;
            z-index: 2; /* Sits above the image */
            transition: all 0.5s ease;
        }

        /* Square Colors */
        #roll div:nth-of-type(1) { background-color: red; }
        #roll div:nth-of-type(2) { background-color: yellow; }
        #roll div:nth-of-type(3) { background-color: blue; }
        #roll div:nth-of-type(4) { background-color: green; }

        /* Hover Effect: Moving the squares and clipping them into the hexagon shape */
        #roll:hover div:nth-of-type(1) { 
            transform: translate(-40px, -40px); 
            clip-path: polygon(100% 0, 100% 100%, 30% 100%); 
        }
        #roll:hover div:nth-of-type(2) { 
            transform: translate(40px, -40px); 
            clip-path: polygon(0 0, 0 100%, 70% 100%); 
        }
        #roll:hover div:nth-of-type(3) { 
            transform: translate(-40px, 40px); 
            clip-path: polygon(100% 0, 30% 0, 100% 100%); 
        }
        #roll:hover div:nth-of-type(4) { 
            transform: translate(40px, 40px); 
            clip-path: polygon(0 0, 70% 0, 0 100%); 
        }

        p { text-align: center; font-family: sans-serif; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="roll">
        <a href="../index.html">
            <img src="images/funny.jpg" alt="Kitten Image">
        </a>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <p>
        Click on the Image for Home<br/>
        Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>

</body>
</html>
