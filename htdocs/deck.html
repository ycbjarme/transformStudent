<!DOCTYPE html>
<html>
<head>
  <title>Transition and Animation Exercises</title>
  <meta charset="UTF-8">
  <meta name="description" content="Sample Code to implement transform and transition">
  <meta name="author" content="Yuuna Jarme">
  <meta name="revised" content="06/04/2026">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }
    #deck {
      width: 300px;
      height: 300px;
      margin: 50px auto;
      position: relative;
    }
    .block {
      position: absolute;
      width: 50%;
      height: 50%;
      transition: all 0.6s ease;
    }
    .top-left { top: 0; left: 0; background: red; }
    .top-right { top: 0; right: 0; background: yellow; }
    .bottom-left { bottom: 0; left: 0; background: blue; }
    .bottom-right { bottom: 0; right: 0; background: green; }

    .center {
      position: absolute;
      top: 25%;
      left: 25%;
      width: 50%;
      height: 50%;
      background: url("https://www.ba-bamail.com/media/kitten.jpg") center/cover no-repeat;
      opacity: 0;
      transition: opacity 0.6s ease;
      border-radius: 10px;
    }

    #deck:hover .top-left { transform: translate(-50%, -50%) rotate(-45deg); }
    #deck:hover .top-right { transform: translate(50%, -50%) rotate(45deg); }
    #deck:hover .bottom-left { transform: translate(-50%, 50%) rotate(45deg); }
    #deck:hover .bottom-right { transform: translate(50%, 50%) rotate(-45deg); }
    #deck:hover .center { opacity: 1; }
    
    a {
      text-decoration: none;
    }
    button {
      display: block;
      width: 200px;
      padding: 5px;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <div id="deck">
    <div class="block top-left"></div>
    <div class="block top-right"></div>
    <div class="block bottom-left"></div>
    <div class="block bottom-right"></div>
    <div class="center"></div>
  </div>
  <a href="../index.html"><button>Click me for Home</button></a>
</body>
</html>
